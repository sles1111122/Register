<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級作業登記系統 (雲端同步版)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 自訂細長捲軸樣式 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">

    <!-- Toast 提示訊息 -->
    <div id="toast" class="hidden fixed top-5 left-1/2 transform -translate-x-1/2 z-50 bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 items-center gap-2">
        <span id="toast-message"></span>
    </div>

    <!-- 雲端同步 Modal -->
    <div id="syncModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl transform transition-all">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="cloud" class="w-6 h-6 text-indigo-600"></i>
                    雲端同步設定
                </h2>
                <button onclick="closeSyncModal()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div id="sync-offline-ui" class="space-y-6">
                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                    <h3 class="font-bold text-indigo-900 mb-2">方式一：建立新的同步房</h3>
                    <p class="text-sm text-indigo-700 mb-3">將您目前裝置上的資料上傳，並產生一組連線碼供其他裝置加入。</p>
                    <button onclick="generateNewSyncCode()" class="w-full py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition-colors shadow-sm flex justify-center items-center gap-2">
                        <i data-lucide="upload-cloud" class="w-4 h-4"></i> 建立並上傳資料
                    </button>
                </div>

                <div class="flex items-center gap-4">
                    <div class="h-px bg-slate-200 flex-grow"></div>
                    <span class="text-sm text-slate-400 font-medium">或</span>
                    <div class="h-px bg-slate-200 flex-grow"></div>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-2">方式二：加入現有同步房</h3>
                    <p class="text-sm text-slate-500 mb-3">輸入其他裝置產生的連線碼，立即下載並同步資料（會覆蓋本機資料）。</p>
                    <div class="flex gap-2">
                        <input type="text" id="syncCodeInput" placeholder="輸入連線碼 (例如: 8A92B)" class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all uppercase">
                        <button onclick="joinSyncCode()" class="px-4 py-2.5 bg-slate-800 text-white font-medium rounded-lg hover:bg-slate-900 transition-colors shadow-sm whitespace-nowrap">
                            連線
                        </button>
                    </div>
                </div>
            </div>

            <div id="sync-online-ui" class="hidden space-y-6 text-center py-4">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 text-green-600 rounded-full mb-2 shadow-inner">
                    <i data-lucide="cloud-snow" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800">已連線至雲端</h3>
                <p class="text-slate-500">所有變更都會即時同步到其他裝置</p>
                
                <div class="bg-slate-100 p-4 rounded-xl border border-slate-200 mt-4">
                    <p class="text-sm text-slate-500 mb-1">您的專屬連線碼</p>
                    <p id="currentSyncCodeDisplay" class="text-3xl font-mono font-bold text-indigo-700 tracking-wider">----</p>
                </div>

                <button onclick="disconnectSync()" class="mt-6 px-5 py-2.5 w-full border-2 border-red-100 bg-red-50 text-red-600 font-medium rounded-lg hover:bg-red-100 transition-colors">
                    中斷連線 (改回本機儲存)
                </button>
            </div>
        </div>
    </div>

    <!-- 座號設定 Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <!-- 同上一個版本的設定面板，省略重複結構以縮短長度 -->
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl transform transition-all">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="settings" class="w-5 h-5 text-indigo-600"></i>
                    <span id="modalClsNameTitle"></span> 座號設定
                </h2>
                <button onclick="closeSettingsModal()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-600">最大座號 (總人數)</label>
                    <input type="number" id="modalMaxSeats" min="1" max="100" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-600">空號設定 (請用逗號分隔)</label>
                    <input type="text" id="modalEmptySeats" placeholder="例如: 4, 14, 25" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none">
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeSettingsModal()" class="px-4 py-2 bg-slate-100 text-slate-600 font-medium rounded-lg">取消</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-indigo-600 text-white font-medium rounded-lg">儲存並套用</button>
            </div>
        </div>
    </div>

    <!-- 主要內容區 -->
    <div id="app" class="max-w-5xl mx-auto space-y-6"></div>

    <!-- Firebase 與 核心邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // Firebase 初始化與全域變數
        // ==========================================
        let db, auth, appId;
        let isReceivingCloudUpdate = false;
        let unsubscribeSnapshot = null;
        let currentSyncId = localStorage.getItem('hwSystemSyncId') || null;

        async function initFirebase() {
            try {
                // 環境變數防呆處理
                const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                
                if (!firebaseConfig) {
                    console.log("Firebase config not found, running in local-only mode.");
                    return;
                }

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // 認證 (強制規定)
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user && currentSyncId) {
                        startCloudSync(currentSyncId);
                    }
                });
            } catch (error) {
                console.error("Firebase init error:", error);
            }
        }

        // ==========================================
        // 基礎設定與狀態管理
        // ==========================================
        const classes = ['401', '402', '404', '405', '406', '407', '414'];
        const quickHomeworks = ['筆記', '習作', '考卷', '學習單', '聯絡簿'];
        
        const getLocalDate = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const statuses = {
            0: { id: 0, label: '已交齊', key: '0', icon: 'check-circle-2', activeColor: 'bg-slate-100', iconColor: '' },
            1: { id: 1, label: '缺交', key: '1', icon: 'x-circle', activeColor: 'bg-red-500 text-white shadow-md border-red-500', iconColor: 'text-red-500' },
            2: { id: 2, label: '待訂正', key: '2', icon: 'alert-triangle', activeColor: 'bg-amber-500 text-white shadow-md border-amber-500', iconColor: 'text-amber-500' },
            3: { id: 3, label: '請假/其他', key: '3', icon: 'info', activeColor: 'bg-blue-500 text-white shadow-md border-blue-500', iconColor: 'text-blue-500' }
        };

        let appState = {
            currentView: 'dashboard',
            selectedClass: classes[0],
            currentTool: 0,
            classData: {},
            currentAssignmentId: {}
        };

        // 初始化預設資料
        classes.forEach(c => {
            const initialId = Date.now() + Math.random();
            appState.classData[c] = {
                maxSeats: 35,
                emptySeats: [],
                assignments: [{ id: initialId, date: getLocalDate(), homeworkName: '', records: {} }]
            };
            appState.currentAssignmentId[c] = initialId;
        });

        // ==========================================
        // 資料儲存與同步核心
        // ==========================================
        function loadLocalData() {
            const saved = localStorage.getItem('hwSystemData_v2');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    classes.forEach(c => {
                        if (parsed.classData && parsed.classData[c]) {
                            appState.classData[c] = parsed.classData[c];
                        }
                    });
                    appState.currentView = parsed.currentView || 'dashboard';
                    appState.selectedClass = parsed.selectedClass || classes[0];
                    appState.currentTool = parsed.currentTool || 0;
                    if(parsed.currentAssignmentId) {
                        appState.currentAssignmentId = { ...appState.currentAssignmentId, ...parsed.currentAssignmentId };
                    }
                } catch(e) {
                    console.error('Local data load failed', e);
                }
            }
        }

        async function saveToCloud() {
            if (!auth || !auth.currentUser || !currentSyncId) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'hw_records', currentSyncId);
            try {
                // 為了避開複雜物件的合併問題，我們將核心資料字串化儲存
                const cloudData = {
                    classDataStr: JSON.stringify(appState.classData),
                    currentAssignmentIdStr: JSON.stringify(appState.currentAssignmentId),
                    lastUpdated: Date.now()
                };
                await setDoc(docRef, cloudData);
            } catch (e) {
                console.error("Cloud save failed", e);
            }
        }

        function saveData() {
            localStorage.setItem('hwSystemData_v2', JSON.stringify(appState));
            // 只有在非「接收雲端更新」的狀態下，才把本地修改推上雲端，避免無限迴圈
            if (!isReceivingCloudUpdate && currentSyncId) {
                saveToCloud();
            }
        }

        // 啟動雲端監聽
        function startCloudSync(syncId) {
            if (unsubscribeSnapshot) unsubscribeSnapshot();
            currentSyncId = syncId;
            localStorage.setItem('hwSystemSyncId', syncId);
            updateSyncUI();

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'hw_records', syncId);
            unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.classDataStr) {
                        isReceivingCloudUpdate = true;
                        
                        appState.classData = JSON.parse(data.classDataStr);
                        appState.currentAssignmentId = JSON.parse(data.currentAssignmentIdStr);
                        localStorage.setItem('hwSystemData_v2', JSON.stringify(appState));
                        renderApp();
                        
                        isReceivingCloudUpdate = false;
                    }
                } else {
                    showToast("找不到該連線碼的資料，請確認是否正確");
                    disconnectSync();
                }
            }, (error) => {
                console.error("Sync listener error", error);
                showToast("連線中斷");
            });
        }

        // ==========================================
        // 雲端同步介面互動
        // ==========================================
        window.openSyncModal = function() {
            document.getElementById('syncModal').classList.remove('hidden');
            updateSyncUI();
        };

        window.closeSyncModal = function() {
            document.getElementById('syncModal').classList.add('hidden');
        };

        function updateSyncUI() {
            const offlineUI = document.getElementById('sync-offline-ui');
            const onlineUI = document.getElementById('sync-online-ui');
            
            if (currentSyncId) {
                offlineUI.classList.add('hidden');
                onlineUI.classList.remove('hidden');
                document.getElementById('currentSyncCodeDisplay').textContent = currentSyncId;
            } else {
                offlineUI.classList.remove('hidden');
                onlineUI.classList.add('hidden');
            }
            renderApp(); // 觸發 Header 標籤更新
        }

        window.generateNewSyncCode = async function() {
            if (!auth || !auth.currentUser) {
                showToast("系統未連線至資料庫，無法建立同步房");
                return;
            }
            const newCode = Math.random().toString(36).substring(2, 7).toUpperCase();
            currentSyncId = newCode;
            localStorage.setItem('hwSystemSyncId', newCode);
            await saveToCloud(); // 初次上傳目前所有本地資料
            startCloudSync(newCode); // 開始監聽
            showToast("✅ 同步房建立成功！");
        };

        window.joinSyncCode = function() {
            const input = document.getElementById('syncCodeInput').value.trim().toUpperCase();
            if (!input) {
                showToast("請輸入連線碼");
                return;
            }
            if (!auth || !auth.currentUser) {
                showToast("系統未連線，無法加入");
                return;
            }
            startCloudSync(input);
            showToast("🔄 正在載入雲端資料...");
        };

        window.disconnectSync = function() {
            if (unsubscribeSnapshot) {
                unsubscribeSnapshot();
                unsubscribeSnapshot = null;
            }
            currentSyncId = null;
            localStorage.removeItem('hwSystemSyncId');
            updateSyncUI();
            showToast("已斷開雲端連線，目前為本機儲存");
        };

        // ==========================================
        // 其他 UI 與操作邏輯 (需掛載到 window 才能在 HTML 中呼叫)
        // ==========================================
        let toastTimeout;
        window.showToast = function(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            toast.classList.remove('hidden');
            toast.classList.add('flex');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('flex');
            }, 2500);
        };

        function getCurrentAssignment() {
            const cls = appState.selectedClass;
            const id = appState.currentAssignmentId[cls];
            return appState.classData[cls].assignments.find(a => a.id == id);
        }

        window.switchView = function(view) { appState.currentView = view; saveData(); renderApp(); };
        window.jumpToAssignment = function(cls, id) { appState.selectedClass = cls; appState.currentAssignmentId[cls] = id; switchView('edit'); };
        window.changeSelectedClass = function(cls) { appState.selectedClass = cls; saveData(); renderApp(); };
        window.changeAssignment = function(idStr) { appState.currentAssignmentId[appState.selectedClass] = parseFloat(idStr); saveData(); renderApp(); };
        
        window.createNewAssignment = function() {
            const newId = Date.now();
            appState.classData[appState.selectedClass].assignments.unshift({ id: newId, date: getLocalDate(), homeworkName: '', records: {} });
            appState.currentAssignmentId[appState.selectedClass] = newId;
            saveData(); renderApp(); showToast('✨ 已新增一筆空白紀錄');
        };

        window.deleteCurrentAssignment = function() {
            if(!confirm('⚠️ 確定要刪除這筆作業紀錄嗎？(無法復原)')) return;
            const cls = appState.selectedClass;
            const id = appState.currentAssignmentId[cls];
            appState.classData[cls].assignments = appState.classData[cls].assignments.filter(a => a.id != id);
            
            if (appState.classData[cls].assignments.length === 0) {
                const newId = Date.now();
                appState.classData[cls].assignments.push({ id: newId, date: getLocalDate(), homeworkName: '', records: {} });
                appState.currentAssignmentId[cls] = newId;
            } else {
                appState.currentAssignmentId[cls] = appState.classData[cls].assignments[0].id;
            }
            saveData(); renderApp(); showToast('🗑️ 紀錄已刪除');
        };

        window.updateDate = function(val) { const a = getCurrentAssignment(); a.date = val; saveData(); updatePreview(); };
        window.updateHomeworkName = function(val) { const a = getCurrentAssignment(); a.homeworkName = val; saveData(); updatePreview(); };
        window.addHomeworkTag = function(tag) { 
            const a = getCurrentAssignment(); a.homeworkName = a.homeworkName ? `${a.homeworkName}, ${tag}` : tag; 
            document.getElementById('homework-input').value = a.homeworkName; saveData(); updatePreview(); 
        };
        window.clearHomework = function() { const a = getCurrentAssignment(); a.homeworkName = ''; document.getElementById('homework-input').value = ''; saveData(); updatePreview(); };
        window.setTool = function(toolId) { appState.currentTool = toolId; saveData(); updateToolsContent(); };
        
        window.toggleStudent = function(id) {
            const clsData = appState.classData[appState.selectedClass];
            if (clsData.emptySeats.includes(id)) return;
            const assignment = getCurrentAssignment();
            const currentStatus = assignment.records[id] || 0;
            assignment.records[id] = appState.currentTool === 0 ? 0 : (currentStatus === appState.currentTool ? 0 : appState.currentTool);
            saveData(); updateGridContent(); updatePreview();
        };

        window.resetRecords = function() {
            if(!confirm('確定要清空這筆作業的所有缺交標記嗎？')) return;
            getCurrentAssignment().records = {}; showToast(`已清空標記`); saveData(); updateGridContent(); updatePreview();
        };

        // Modal 操作
        let currentEditingClass = '';
        window.openSettingsModal = function(cls) {
            currentEditingClass = cls;
            const data = appState.classData[cls];
            document.getElementById('modalClsNameTitle').textContent = `${cls} 班`;
            document.getElementById('modalMaxSeats').value = data.maxSeats;
            document.getElementById('modalEmptySeats').value = data.emptySeats.join(', ');
            document.getElementById('settingsModal').classList.remove('hidden');
            lucide.createIcons();
        };
        window.closeSettingsModal = function() { document.getElementById('settingsModal').classList.add('hidden'); };
        window.saveSettings = function() {
            const maxSeats = parseInt(document.getElementById('modalMaxSeats').value) || 35;
            const emptySeats = document.getElementById('modalEmptySeats').value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            appState.classData[currentEditingClass].maxSeats = maxSeats;
            appState.classData[currentEditingClass].emptySeats = emptySeats;
            emptySeats.forEach(id => { appState.classData[currentEditingClass].assignments.forEach(a => { delete a.records[id]; }); });
            saveData(); closeSettingsModal(); showToast(`✅ 設定已儲存！`); renderApp();
        };

        // 報告產生
        function getAssignmentStats(cls, assignment) {
            const data = appState.classData[cls];
            let missing = 0, correction = 0, leave = 0;
            for(let i = 1; i <= data.maxSeats; i++) {
                if (data.emptySeats.includes(i)) continue;
                const status = assignment.records[i] || 0;
                if (status === 1) missing++; if (status === 2) correction++; if (status === 3) leave++;
            }
            const hasRecord = Object.keys(assignment.records).length > 0;
            return { missing, correction, leave, isAllClear: missing === 0 && correction === 0 && leave === 0 && hasRecord, hasRecord };
        }

        window.generateClassReportText = function(cls, specificAssignmentId = null) {
            let report = `【${cls}班 作業登記】\n`;
            const data = appState.classData[cls];
            
            const generateSingle = (a) => {
                const missing = [], correction = [], leave = [];
                for (let i = 1; i <= data.maxSeats; i++) {
                    if (data.emptySeats.includes(i)) continue;
                    const status = a.records[i] || 0;
                    if (status === 1) missing.push(i); if (status === 2) correction.push(i); if (status === 3) leave.push(i);
                }
                let str = `🔹 ${a.date} ${a.homeworkName ? '['+a.homeworkName+']' : ''}\n`;
                if (missing.length === 0 && correction.length === 0 && leave.length === 0) {
                    str += Object.keys(a.records).length > 0 ? `  ✨ 皆已繳交完成！\n` : `  (尚未開始標記)\n`;
                } else {
                    if (missing.length > 0) str += `  🔴 缺交 (${missing.length}): ${missing.join(', ')}\n`;
                    if (correction.length > 0) str += `  🟡 待訂正 (${correction.length}): ${correction.join(', ')}\n`;
                    if (leave.length > 0) str += `  🔵 請假 (${leave.length}): ${leave.join(', ')}\n`;
                }
                return str;
            };

            if (specificAssignmentId) {
                const a = data.assignments.find(x => x.id == specificAssignmentId);
                if(a) { report += `------------------------\n`; report += generateSingle(a); }
            } else {
                if (data.assignments.length === 0) report += "------------------------\n目前無任何紀錄\n";
                else {
                    const sorted = [...data.assignments].sort((a,b) => b.id - a.id);
                    sorted.forEach(a => { report += generateSingle(a) + '\n'; });
                }
            }
            return report.trim();
        };

        window.generateAllReportText = function() {
            let allReport = `【全校作業登記總表】\n匯出日期: ${getLocalDate()}\n\n`;
            classes.forEach(cls => { allReport += window.generateClassReportText(cls) + '\n\n'; });
            return allReport.trim();
        };

        window.copyToClipboard = function(textToCopy, successMsg) {
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy; document.body.appendChild(textArea); textArea.select();
            try { document.execCommand('copy'); window.showToast(successMsg || '✅ 登記表已複製！'); } 
            catch (err) { window.showToast('❌ 複製失敗'); }
            document.body.removeChild(textArea);
        };

        // ==========================================
        // UI 渲染
        // ==========================================
        const appContainer = document.getElementById('app');

        function renderApp() {
            if (appState.currentView === 'dashboard') appContainer.innerHTML = getDashboardHTML();
            else {
                appContainer.innerHTML = getEditViewHTML();
                updateToolsContent(); updateGridContent(); updatePreview();
            }
            lucide.createIcons();
        }

        function updateToolsContent() {
            const container = document.getElementById('tools-container');
            if(!container) return;
            let html = '';
            Object.values(statuses).forEach(st => {
                const isActive = appState.currentTool === parseInt(st.key);
                const btnClass = isActive ? `flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium transition-all duration-200 border-2 ${st.activeColor}`
                    : `flex items-center gap-2 px-4 py-2.5 rounded-xl font-medium transition-all duration-200 border-2 bg-white text-slate-600 border-slate-200 hover:bg-slate-50`;
                const badgeClass = isActive ? 'bg-black/20 text-white' : 'bg-slate-100 text-slate-400';
                html += `<button onclick="setTool(${st.key})" class="${btnClass}"><i data-lucide="${st.icon}" class="w-4 h-4"></i><span>${st.label}</span><span class="ml-1 text-xs px-1.5 py-0.5 rounded-md ${badgeClass}">${st.key}</span></button>`;
            });
            container.innerHTML = html; lucide.createIcons();
        }

        function updateGridContent() {
            const container = document.getElementById('grid-container');
            if(!container) return;
            const clsData = appState.classData[appState.selectedClass];
            const assignment = getCurrentAssignment();
            let html = '';
            
            for(let i = 1; i <= clsData.maxSeats; i++) {
                if (clsData.emptySeats.includes(i)) {
                    html += `<div class="h-16 rounded-xl border-2 border-dashed border-slate-200 bg-slate-50 flex items-center justify-center text-slate-300 font-bold opacity-50 cursor-not-allowed">${i}</div>`;
                    continue;
                }
                const statusId = assignment.records[i] || 0;
                const st = statuses[statusId];
                let btnClass = `relative h-16 rounded-xl text-xl font-bold flex flex-col items-center justify-center border-2 transition-all transform hover:-translate-y-1 hover:shadow-md cursor-pointer select-none ${statusId === 0 ? "bg-white text-slate-700 border-slate-200" : st.activeColor}`;
                let badgeHtml = statusId !== 0 ? `<span class="absolute -top-2 -right-2 bg-white rounded-full p-0.5 shadow-sm ${st.iconColor}"><i data-lucide="${st.icon}" style="width:14px; height:14px;"></i></span>` : '';
                html += `<button onclick="toggleStudent(${i})" class="${btnClass}">${i}${badgeHtml}</button>`;
            }
            container.innerHTML = html;
            document.getElementById('current-tool-label').textContent = statuses[appState.currentTool].label;
            lucide.createIcons();
        }

        function updatePreview() {
            const preContainer = document.getElementById('preview-content');
            if(preContainer) preContainer.textContent = window.generateClassReportText(appState.selectedClass, appState.currentAssignmentId[appState.selectedClass]);
        }

        function getDashboardHTML() {
            const syncStatusHtml = currentSyncId 
                ? `<span class="text-sm text-green-700 bg-green-100 px-3 py-1.5 rounded-lg flex items-center gap-1"><i data-lucide="cloud-snow" class="w-4 h-4"></i> 已連線 (${currentSyncId})</span>`
                : `<span class="text-sm text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg flex items-center gap-1"><i data-lucide="hard-drive" class="w-4 h-4"></i> 本機儲存</span>`;

            let html = `
            <div class="space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                    <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="layout-dashboard" class="text-indigo-600"></i> 作業登記總表
                    </h1>
                    <div class="flex items-center gap-3 w-full md:w-auto">
                        ${syncStatusHtml}
                        <button onclick="openSyncModal()" class="p-2.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-lg transition-colors" title="雲端同步設定">
                            <i data-lucide="cloud-upload" class="w-5 h-5"></i>
                        </button>
                        <button onclick="copyToClipboard(generateAllReportText(), '✅ 全校總表已複製！')" class="flex-grow md:flex-grow-0 flex justify-center items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-medium shadow-sm transition-all">
                            <i data-lucide="clipboard-copy" class="w-5 h-5"></i> 複製合併報告
                        </button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">`;

            classes.forEach(cls => {
                const data = appState.classData[cls];
                let assignmentsHtml = '<div class="space-y-1 mt-2 mb-4 flex-grow overflow-y-auto min-h-[5rem] max-h-[10rem] custom-scrollbar bg-slate-50 p-2 rounded-xl border border-slate-100 shadow-inner">';
                if (data.assignments.length === 0) assignmentsHtml += '<p class="text-sm text-slate-400 text-center py-4">目前無作業紀錄</p>';
                else {
                    const sorted = [...data.assignments].sort((a, b) => b.id - a.id);
                    sorted.forEach(a => {
                        const stats = getAssignmentStats(cls, a);
                        let badgeHtml = !stats.hasRecord ? `<span class="text-xs text-slate-400">未標記</span>` : 
                                        stats.isAllClear ? `<span class="text-xs text-green-600 bg-green-100 px-1.5 py-0.5 rounded font-medium shrink-0">全齊</span>` : 
                                        `<span class="text-xs space-x-1 shrink-0 flex items-center">${(stats.missing>0?`<span class="text-red-600 font-medium">缺${stats.missing}</span>`:'')} ${(stats.correction>0?`<span class="text-amber-600 font-medium">訂${stats.correction}</span>`:'')}</span>`;
                        assignmentsHtml += `<div onclick="jumpToAssignment('${cls}', ${a.id})" class="flex justify-between items-center py-2 px-2 border-b border-slate-200 last:border-0 hover:bg-indigo-50/70 rounded cursor-pointer transition-colors group"><div class="truncate pr-2 text-sm text-slate-700 flex items-center gap-1.5"><span class="text-slate-400 font-mono text-xs">${a.date.slice(5)}</span> <span class="group-hover:text-indigo-700 font-medium">${a.homeworkName || '未命名'}</span></div><div>${badgeHtml}</div></div>`;
                    });
                }
                assignmentsHtml += '</div>';

                html += `<div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 hover:shadow-md transition-shadow flex flex-col relative group">
                        <button onclick="openSettingsModal('${cls}')" class="absolute top-4 right-4 p-1.5 text-slate-300 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="座號設定"><i data-lucide="settings" class="w-5 h-5"></i></button>
                        <div class="flex justify-between items-start mb-2 pr-10"><h2 class="text-2xl font-bold text-slate-700">${cls} 班</h2></div>
                        <div class="text-xs font-medium text-slate-500 mb-1 flex justify-between px-1"><span>作業歷史清單</span><span class="bg-slate-200 text-slate-600 px-1.5 rounded-md">${data.assignments.length}筆</span></div>
                        ${assignmentsHtml}
                        <button onclick="switchView('edit'); window.changeSelectedClass('${cls}')" class="mt-auto w-full py-2.5 bg-white hover:bg-indigo-50 border border-slate-200 hover:border-indigo-200 text-slate-700 hover:text-indigo-700 rounded-xl font-medium transition-colors flex items-center justify-center gap-1.5">
                            進入最新登記 <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </button>
                    </div>`;
            });
            html += `</div></div>`; return html;
        }

        function getEditViewHTML() {
            const cls = appState.selectedClass;
            const data = appState.classData[cls];
            const assignment = getCurrentAssignment();
            
            let classOptions = ''; classes.forEach(c => { classOptions += `<option value="${c}" ${c === cls ? 'selected' : ''}>${c} 班</option>`; });
            let assignmentOptions = '';
            [...data.assignments].sort((a, b) => b.id - a.id).forEach(a => { assignmentOptions += `<option value="${a.id}" ${a.id == assignment.id ? 'selected' : ''}>${a.date} ${a.homeworkName || '(未命名)'}</option>`; });
            let quickHwHtml = ''; quickHomeworks.forEach(hw => { quickHwHtml += `<button onclick="addHomeworkTag('${hw}')" class="px-3 py-1.5 text-sm font-medium bg-indigo-50 text-indigo-700 rounded-md hover:bg-indigo-100 shadow-sm">+ ${hw}</button>`; });

            return `
            <div class="space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                        <div class="flex items-center gap-4">
                            <button onclick="switchView('dashboard')" class="text-slate-500 hover:text-indigo-600 p-2 -ml-2 rounded-lg hover:bg-indigo-50"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                            <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2"><i data-lucide="book-open" class="text-indigo-600"></i> ${cls} 班作業登記</h1>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-sm font-medium text-slate-600 hidden md:inline"><i data-lucide="users" class="w-4 h-4 inline mb-1"></i> 切換班級:</label>
                            <select onchange="changeSelectedClass(this.value)" class="p-2 bg-slate-50 border border-slate-300 rounded-lg outline-none font-medium">${classOptions}</select>
                        </div>
                    </div>
                    <div class="flex flex-col md:flex-row items-center gap-2 p-3 bg-indigo-50/50 rounded-xl border border-indigo-100">
                        <div class="w-full md:w-auto flex-grow flex items-center gap-2">
                            <label class="text-sm font-bold text-indigo-900 whitespace-nowrap"><i data-lucide="folder-open" class="w-4 h-4 inline mb-0.5"></i> 選擇紀錄：</label>
                            <select id="assignment-select" onchange="changeAssignment(this.value)" class="flex-grow w-full p-2.5 bg-white border border-indigo-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-medium shadow-sm">${assignmentOptions}</select>
                        </div>
                        <div class="flex w-full md:w-auto gap-2 shrink-0">
                            <button onclick="createNewAssignment()" class="flex-1 md:flex-none flex justify-center items-center gap-1 px-4 py-2.5 bg-indigo-600 text-white hover:bg-indigo-700 font-medium rounded-lg text-sm shadow-sm"><i data-lucide="plus" class="w-4 h-4"></i> 新增紀錄</button>
                            <button onclick="deleteCurrentAssignment()" class="flex justify-center items-center px-3 py-2.5 bg-red-50 text-red-600 hover:bg-red-100 font-medium rounded-lg text-sm"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4 pt-4 border-t border-slate-100">
                        <div class="space-y-1"><label class="text-sm font-medium text-slate-600 flex items-center gap-1"><i data-lucide="calendar" class="w-4 h-4"></i> 日期</label><input type="date" value="${assignment.date}" onchange="updateDate(this.value)" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" /></div>
                        <div class="space-y-1 md:col-span-2"><label class="text-sm font-medium text-slate-600 flex items-center gap-1"><i data-lucide="tag" class="w-4 h-4"></i> 作業名稱</label>
                            <div class="flex gap-2"><input id="homework-input" type="text" value="${assignment.homeworkName}" oninput="updateHomeworkName(this.value)" placeholder="手動輸入..." class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" /><button onclick="clearHomework()" class="px-3 py-2 bg-slate-100 text-slate-500 rounded-lg hover:bg-slate-200"><i data-lucide="eraser" class="w-4 h-4 mt-0.5"></i></button></div>
                            <div class="flex flex-wrap gap-2 mt-2 pt-1">${quickHwHtml}</div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sticky top-4 z-10">
                    <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                        <div><h2 class="text-lg font-semibold text-slate-800 mb-1">標記模式</h2><p class="text-sm text-slate-500">按鍵盤 <kbd class="bg-slate-100 px-1.5 py-0.5 rounded text-xs border">1</kbd> <kbd class="bg-slate-100 px-1.5 py-0.5 rounded text-xs border">2</kbd> <kbd class="bg-slate-100 px-1.5 py-0.5 rounded text-xs border">3</kbd> 快速切換</p></div>
                        <div id="tools-container" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                        <h2 class="text-lg font-semibold text-slate-800 flex items-center gap-2">點擊座號登記 <span class="text-sm font-normal text-slate-500 bg-slate-100 px-2 py-1 rounded-md">目前: <span id="current-tool-label" class="font-medium text-indigo-600">已交齊</span></span></h2>
                        <div class="flex items-center gap-3">
                            <div class="flex flex-col items-end"><span class="text-sm font-medium text-slate-700">總座號: ${data.maxSeats}</span>${data.emptySeats.length > 0 ? `<span class="text-xs text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">空號: ${data.emptySeats.join(',')}</span>` : ''}</div>
                            <button onclick="openSettingsModal('${appState.selectedClass}')" class="p-2 bg-slate-100 text-slate-600 hover:bg-indigo-100 hover:text-indigo-600 rounded-lg border border-slate-200"><i data-lucide="settings" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                    <div id="grid-container" class="grid grid-cols-5 sm:grid-cols-7 md:grid-cols-10 gap-3"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2 bg-slate-800 rounded-2xl shadow-sm p-6 text-slate-100 flex flex-col"><h3 class="text-lg font-semibold mb-4 text-white flex items-center gap-2"><i data-lucide="clipboard-copy" class="w-5 h-5"></i> 單筆報告預覽</h3><pre id="preview-content" class="flex-grow whitespace-pre-wrap font-mono text-sm bg-slate-900/50 p-4 rounded-xl text-slate-300"></pre></div>
                    <div class="space-y-4 flex flex-col justify-end">
                        <button onclick="copyToClipboard(generateClassReportText('${cls}', ${assignment.id}), '✅ 單筆報告已複製！')" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-md shadow-indigo-200 transition-all flex justify-center gap-2 text-lg"><i data-lucide="clipboard-copy" class="w-6 h-6"></i> 複製此份報告</button>
                        <button onclick="resetRecords()" class="w-full py-3 bg-white border-2 border-slate-200 hover:bg-slate-50 text-slate-600 rounded-xl font-semibold transition-all flex justify-center gap-2"><i data-lucide="rotate-ccw" class="w-4 h-4"></i> 清除點名標記</button>
                    </div>
                </div>
            </div>`;
        }

        window.addEventListener('keydown', (e) => {
            if (!document.getElementById('settingsModal').classList.contains('hidden') || !document.getElementById('syncModal').classList.contains('hidden')) return;
            if (appState.currentView !== 'edit') return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
            if (['0', '1', '2', '3'].includes(e.key)) { window.setTool(parseInt(e.key, 10)); window.showToast(`已切換為「${statuses[e.key].label}」模式`); }
        });

        // 啟動應用
        window.onload = async () => {
            loadLocalData(); 
            renderApp();
            await initFirebase(); // 啟動雲端連線機制
        };
    </script>
</body>
</html>
